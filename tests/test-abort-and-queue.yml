name: Test abort-after-seconds, branch, and queue-name inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          abort-after-seconds: "5"
          branch: "main"
          queue-name: "test-queue"
          same-branch-only: "false"
        continue-on-error: true
      - name: Assert action completed
        run: |
          echo "action outcome: ${{ steps.action.outcome }}"
          # The action may succeed (no prior run) or fail (abort-after-seconds triggered).
          # Either outcome is acceptable — we just verify the action ran.
          echo "PASS: action ran with abort-after-seconds, branch, and queue-name inputs"
