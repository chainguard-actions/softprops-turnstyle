name: Test job-to-wait-for and step-to-wait-for inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          job-to-wait-for: "deploy"
          step-to-wait-for: "Deploy step"
          continue-after-seconds: "5"
          poll-interval-seconds: "10"
          same-branch-only: "false"
        continue-on-error: true
      - name: Assert action completed with job-to-wait-for and step-to-wait-for inputs
        run: |
          echo "job-to-wait-for and step-to-wait-for input test completed"
          echo "PASS"
