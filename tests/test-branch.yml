name: Test branch input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          branch: "main"
          continue-after-seconds: "5"
          poll-interval-seconds: "10"
          same-branch-only: "true"
        continue-on-error: true
      - name: Assert action completed with branch input
        run: |
          echo "branch input test completed"
          echo "PASS"
