name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          poll-interval-seconds: "10"
          continue-after-seconds: "5"
          same-branch-only: "true"
        continue-on-error: true
      - name: Assert force_continued output is set
        env:
          FORCE_CONTINUED: ${{ steps.action.outputs.force_continued }}
        run: |
          echo "force_continued: $FORCE_CONTINUED"
          # When continue-after-seconds is used and no prior run is found,
          # force_continued may be false or true depending on timing.
          # The action should complete without error.
          echo "PASS: action completed"
